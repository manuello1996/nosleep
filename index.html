<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f2f2f7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="NoSleep PiP">
  <meta name="mobile-web-app-capable" content="yes">
  <title>NoSleep PiP</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    :root {
      --bg: #f2f2f7;
      --card: #ffffffcc;
      --stroke: #d1d1d6;
      --text: #111111;
      --muted: #636366;
      --tint: #007aff;
      --danger: #ff3b30;
      --ok: #34c759;
      --shadow: 0 12px 30px #00000014;
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: "SF Pro Text", "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 800px at 0% -20%, #dbe9ff 0%, transparent 45%),
        radial-gradient(1000px 700px at 100% -10%, #ffe7ef 0%, transparent 50%),
        var(--bg);
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 20px 16px calc(env(safe-area-inset-bottom) + 20px);
    }

    .app {
      width: min(540px, 100%);
      background: var(--card);
      backdrop-filter: blur(14px) saturate(1.2);
      border: 1px solid #ffffff80;
      border-radius: 30px;
      box-shadow: var(--shadow);
      padding: 22px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.45rem, 5.6vw, 2rem);
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.45;
    }

    .actions {
      margin-top: 18px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 14px;
      min-height: 48px;
      padding: 0 14px;
      font-size: 1rem;
      font-weight: 650;
      letter-spacing: -0.01em;
      cursor: pointer;
      transition: transform 120ms ease, opacity 120ms ease, filter 120ms ease;
    }

    button:active { transform: translateY(1px); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    #startBtn {
      background: var(--tint);
      color: #fff;
    }

    #stopBtn {
      background: #fff;
      color: var(--danger);
      border: 1px solid #ffd2cf;
    }

    .status {
      margin-top: 12px;
      border-radius: 14px;
      border: 1px solid var(--stroke);
      background: #fff;
      padding: 10px 12px;
      font-size: 0.93rem;
      color: var(--muted);
      white-space: pre-line;
    }

    .status.ok { color: #1f7a3e; border-color: #caeed6; }
    .status.warn { color: #925c1f; border-color: #f6dfb8; }

    .player {
      margin-top: 12px;
      border-radius: var(--radius);
      border: 1px solid var(--stroke);
      background: #fff;
      overflow: hidden;
      display: none;
    }

    .player.visible { display: block; }

    .player-head {
      padding: 10px 12px 8px;
      border-bottom: 1px solid #efeff4;
      color: var(--muted);
      font-size: 0.86rem;
    }

    video {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
    }

    footer {
      margin-top: 14px;
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>Keep Awake</h1>
    <p class="subtitle">Start keeps the phone awake with Wake Lock + lightweight PiP-capable dummy video.</p>

    <div class="actions">
      <button id="startBtn">Start</button>
      <button id="stopBtn" disabled>Stop</button>
    </div>

    <div id="status" class="status">Idle.</div>

    <section id="playerBox" class="player" aria-live="polite">
      <div class="player-head">Use the native PiP button if auto-PiP is blocked.</div>
      <video id="fakeVideo" muted playsinline controls></video>
    </section>

    <footer>Dev by Fonzi</footer>
  </main>

  <script>
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusEl = document.getElementById('status');
    const playerBox = document.getElementById('playerBox');
    const fakeVideo = document.getElementById('fakeVideo');

    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
      (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

    let wakeLockSentinel = null;
    let fakeStream = null;
    let fakeCanvas = null;
    let fakeCtx = null;
    let frameTicker = null;
    let frameToggle = false;
    let recordedClipUrl = '';
    let keepAwakeEnabled = false;

    function setStatus(lines, tone = '') {
      statusEl.className = `status ${tone}`.trim();
      statusEl.textContent = Array.isArray(lines) ? lines.join('\n') : lines;
    }

    function supportsPiP() {
      const std = 'pictureInPictureEnabled' in document;
      const safari = typeof fakeVideo.webkitSetPresentationMode === 'function';
      return std || safari;
    }

    async function requestWakeLock() {
      if (!('wakeLock' in navigator)) return false;
      try {
        wakeLockSentinel = await navigator.wakeLock.request('screen');
        wakeLockSentinel.addEventListener('release', () => {
          wakeLockSentinel = null;
          if (keepAwakeEnabled) {
            setStatus([
              'Wake Lock released by browser/OS.',
              'PiP may still keep activity on supported devices.'
            ], 'warn');
          }
        });
        return true;
      } catch {
        return false;
      }
    }

    function createTinyFakeStream() {
      if (fakeStream) return fakeStream;

      fakeCanvas = document.createElement('canvas');
      fakeCanvas.width = isIOS ? 160 : 2;
      fakeCanvas.height = isIOS ? 90 : 2;
      fakeCtx = fakeCanvas.getContext('2d', { alpha: false });
      fakeCtx.fillStyle = '#000';
      fakeCtx.fillRect(0, 0, fakeCanvas.width, fakeCanvas.height);

      frameTicker = setInterval(() => {
        if (!fakeCtx || !fakeCanvas) return;
        frameToggle = !frameToggle;
        fakeCtx.fillStyle = '#000';
        fakeCtx.fillRect(0, 0, fakeCanvas.width, fakeCanvas.height);
        fakeCtx.fillStyle = frameToggle ? '#010101' : '#000000';
        fakeCtx.fillRect(0, 0, 1, 1);
      }, 1000);

      fakeStream = fakeCanvas.captureStream(1);
      return fakeStream;
    }

    async function createRecordedClipUrl() {
      if (recordedClipUrl) return recordedClipUrl;
      if (!('MediaRecorder' in window)) return '';

      const stream = createTinyFakeStream();
      const types = ['video/mp4', 'video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm'];
      if (isIOS) types.splice(1, 0, 'video/mp4;codecs=avc1.42E01E');

      const mimeType = types.find((t) => {
        if (typeof MediaRecorder.isTypeSupported !== 'function') return isIOS ? t === 'video/mp4' : t === 'video/webm';
        return MediaRecorder.isTypeSupported(t);
      }) || '';

      let recorder;
      try {
        recorder = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);
      } catch {
        return '';
      }

      const chunks = [];
      const stopped = new Promise((resolve) => {
        recorder.addEventListener('dataavailable', (e) => {
          if (e.data && e.data.size > 0) chunks.push(e.data);
        });
        recorder.addEventListener('stop', resolve, { once: true });
      });

      recorder.start(500);
      await new Promise((r) => setTimeout(r, isIOS ? 2600 : 900));
      recorder.stop();
      await stopped;

      if (!chunks.length) return '';
      const blobType = mimeType || chunks[0].type || 'video/webm';
      recordedClipUrl = URL.createObjectURL(new Blob(chunks, { type: blobType }));
      return recordedClipUrl;
    }

    async function requestPiP() {
      if ('pictureInPictureEnabled' in document && document.pictureInPictureEnabled) {
        if (document.pictureInPictureElement !== fakeVideo) {
          await fakeVideo.requestPictureInPicture();
        }
        return true;
      }
      if (
        typeof fakeVideo.webkitSetPresentationMode === 'function' &&
        (
          typeof fakeVideo.webkitSupportsPresentationMode !== 'function' ||
          fakeVideo.webkitSupportsPresentationMode('picture-in-picture')
        )
      ) {
        fakeVideo.webkitSetPresentationMode('picture-in-picture');
        return true;
      }
      return false;
    }

    async function exitPiP() {
      if (document.pictureInPictureElement) {
        await document.exitPictureInPicture();
      } else if (
        typeof fakeVideo.webkitSetPresentationMode === 'function' &&
        fakeVideo.webkitPresentationMode === 'picture-in-picture'
      ) {
        fakeVideo.webkitSetPresentationMode('inline');
      }
    }

    async function waitForVideoReady(video, timeoutMs = 900) {
      if (video.readyState >= 2) return;
      await new Promise((resolve) => {
        let done = false;
        const finish = () => {
          if (done) return;
          done = true;
          resolve();
        };
        const timer = setTimeout(finish, timeoutMs);
        video.addEventListener('loadeddata', () => { clearTimeout(timer); finish(); }, { once: true });
        video.addEventListener('canplay', () => { clearTimeout(timer); finish(); }, { once: true });
      });
    }

    async function startVideoAndTryPiP() {
      fakeVideo.autoplay = true;
      fakeVideo.loop = true;
      fakeVideo.disablePictureInPicture = false;
      fakeVideo.src = '';

      if (!isIOS) {
        fakeVideo.srcObject = createTinyFakeStream();
        await Promise.resolve(fakeVideo.play()).catch(() => {});
        await waitForVideoReady(fakeVideo);
        const pipOk = await requestPiP().catch(() => false);
        if (pipOk) return true;
      }

      const clipUrl = await createRecordedClipUrl();
      if (clipUrl) {
        fakeVideo.srcObject = null;
        fakeVideo.src = clipUrl;
        fakeVideo.currentTime = 0;
        await Promise.resolve(fakeVideo.play()).catch(() => {});
        await waitForVideoReady(fakeVideo);
        return requestPiP().catch(() => false);
      }

      fakeVideo.srcObject = createTinyFakeStream();
      await Promise.resolve(fakeVideo.play()).catch(() => {});
      await waitForVideoReady(fakeVideo);
      return requestPiP().catch(() => false);
    }

    async function start() {
      keepAwakeEnabled = true;
      startBtn.disabled = true;
      stopBtn.disabled = false;
      playerBox.classList.add('visible');

      const [pipOk, wakeOk] = await Promise.all([
        startVideoAndTryPiP().catch(() => false),
        requestWakeLock()
      ]);

      const lines = [];
      lines.push(wakeOk ? 'Wake Lock: active.' : 'Wake Lock: unavailable or blocked.');
      lines.push(pipOk ? 'PiP: active.' : (supportsPiP() ? 'PiP: blocked. Use the video player PiP button.' : 'PiP: not supported.'));
      lines.push('Keep this app open for best reliability.');
      setStatus(lines, wakeOk || pipOk ? 'ok' : 'warn');
    }

    async function stop() {
      keepAwakeEnabled = false;
      startBtn.disabled = false;
      stopBtn.disabled = true;

      if (wakeLockSentinel) {
        try { await wakeLockSentinel.release(); } catch {}
        wakeLockSentinel = null;
      }

      await exitPiP().catch(() => {});

      try {
        fakeVideo.pause();
        fakeVideo.srcObject = null;
        fakeVideo.src = '';
      } catch {}

      if (fakeStream) {
        fakeStream.getTracks().forEach((t) => t.stop());
        fakeStream = null;
      }
      if (frameTicker) {
        clearInterval(frameTicker);
        frameTicker = null;
      }
      fakeCanvas = null;
      fakeCtx = null;
      playerBox.classList.remove('visible');
      setStatus('Stopped.');
    }

    document.addEventListener('visibilitychange', async () => {
      if (!keepAwakeEnabled) return;
      if (document.visibilityState === 'visible' && !wakeLockSentinel) {
        await requestWakeLock();
      }
    });

    startBtn.addEventListener('click', start);
    stopBtn.addEventListener('click', stop);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
