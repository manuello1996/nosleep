<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0b0b0b">
  <title>No Sleep PiP</title>
  <style>
    :root {
      --bg: #0b0b0b;
      --card: #151515;
      --text: #f2f2f2;
      --muted: #a8a8a8;
      --ok: #4ade80;
      --warn: #fbbf24;
      --btn: #f2f2f2;
      --btn-text: #0b0b0b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100dvh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at top, #1b1b1b 0, var(--bg) 55%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 20px;
    }

    main {
      width: min(560px, 100%);
      background: color-mix(in oklab, var(--card), black 8%);
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.3rem, 3.8vw, 1.8rem);
      line-height: 1.2;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    button {
      appearance: none;
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.98rem;
      font-weight: 600;
      cursor: pointer;
      background: var(--btn);
      color: var(--btn-text);
    }

    button.secondary {
      background: #2a2a2a;
      color: var(--text);
      border: 1px solid #3c3c3c;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status {
      margin-top: 14px;
      border-radius: 10px;
      background: #111;
      border: 1px solid #292929;
      padding: 10px 12px;
      font-size: 0.93rem;
      line-height: 1.4;
      color: var(--muted);
      white-space: pre-line;
    }

    .ok { color: var(--ok); }
    .warn { color: var(--warn); }

    .player {
      margin-top: 14px;
      border: 1px solid #292929;
      border-radius: 10px;
      background: #0f0f0f;
      padding: 10px;
    }

    .player p {
      margin-bottom: 8px;
      font-size: 0.88rem;
    }

    video {
      width: 100%;
      max-width: 240px;
      aspect-ratio: 16 / 9;
      border-radius: 8px;
      background: #000;
    }
  </style>
</head>
<body>
  <main>
    <h1>Keep Phone Awake (Low-Power) - v1.2</h1>
    <p>
      Tap start. The page requests Screen Wake Lock and also runs a tiny fake video that can enter PiP on supported mobile browsers.
    </p>

    <div class="actions">
      <button id="startBtn">Start</button>
      <button id="pipBtn" class="secondary" disabled>Open PiP</button>
      <button id="stopBtn" class="secondary" disabled>Stop</button>
    </div>

    <div id="status" class="status">Idle.</div>

    <div class="player">
      <p>Backup: use the video controls PiP button if auto PiP is blocked.</p>
      <video id="fakeVideo" muted playsinline controls></video>
    </div>
  </main>

  <script>
    const startBtn = document.getElementById('startBtn');
    const pipBtn = document.getElementById('pipBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusEl = document.getElementById('status');
    const fakeVideo = document.getElementById('fakeVideo');

    let wakeLockSentinel = null;
    let fakeStream = null;
    let recordedClipUrl = '';
    let keepAwakeEnabled = false;

    function setStatus(lines, tone = '') {
      statusEl.className = `status ${tone}`.trim();
      statusEl.textContent = Array.isArray(lines) ? lines.join('\n') : lines;
    }

    function supportsPiP() {
      const std = 'pictureInPictureEnabled' in document;
      const safari = typeof fakeVideo.webkitSetPresentationMode === 'function';
      return std || safari;
    }

    async function requestWakeLock() {
      if (!('wakeLock' in navigator)) return false;
      try {
        wakeLockSentinel = await navigator.wakeLock.request('screen');
        wakeLockSentinel.addEventListener('release', () => {
          wakeLockSentinel = null;
          if (keepAwakeEnabled) {
            setStatus([
              'Wake lock released by the browser/OS.',
              'PiP video can still help on supported devices.'
            ], 'warn');
          }
        });
        return true;
      } catch {
        return false;
      }
    }

    function createTinyFakeStream() {
      if (fakeStream) return fakeStream;
      const canvas = document.createElement('canvas');
      canvas.width = 2;
      canvas.height = 2;
      const ctx = canvas.getContext('2d', { alpha: false });
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, 2, 2);
      fakeStream = canvas.captureStream(1);
      return fakeStream;
    }

    async function createRecordedClipUrl() {
      if (recordedClipUrl) return recordedClipUrl;
      if (!('MediaRecorder' in window)) return '';

      const stream = createTinyFakeStream();
      const types = [
        'video/webm;codecs=vp9',
        'video/webm;codecs=vp8',
        'video/webm',
        'video/mp4'
      ];
      const mimeType = types.find((t) => {
        if (typeof MediaRecorder.isTypeSupported !== 'function') return t === 'video/webm';
        return MediaRecorder.isTypeSupported(t);
      }) || '';

      let recorder;
      try {
        recorder = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);
      } catch {
        return '';
      }

      const chunks = [];
      const stopped = new Promise((resolve) => {
        recorder.addEventListener('dataavailable', (e) => {
          if (e.data && e.data.size > 0) chunks.push(e.data);
        });
        recorder.addEventListener('stop', resolve, { once: true });
      });

      recorder.start(250);
      await new Promise((r) => setTimeout(r, 900));
      recorder.stop();
      await stopped;

      if (!chunks.length) return '';
      const blobType = mimeType || chunks[0].type || 'video/webm';
      recordedClipUrl = URL.createObjectURL(new Blob(chunks, { type: blobType }));
      return recordedClipUrl;
    }

    async function requestPiP() {
      if ('pictureInPictureEnabled' in document && document.pictureInPictureEnabled) {
        if (document.pictureInPictureElement !== fakeVideo) {
          await fakeVideo.requestPictureInPicture();
        }
        return true;
      }

      if (
        typeof fakeVideo.webkitSetPresentationMode === 'function' &&
        (
          typeof fakeVideo.webkitSupportsPresentationMode !== 'function' ||
          fakeVideo.webkitSupportsPresentationMode('picture-in-picture')
        )
      ) {
        fakeVideo.webkitSetPresentationMode('picture-in-picture');
        return true;
      }

      return false;
    }

    async function waitForVideoReady(video, timeoutMs = 800) {
      if (video.readyState >= 2) return;
      await new Promise((resolve) => {
        let done = false;
        const finish = () => {
          if (done) return;
          done = true;
          video.removeEventListener('loadeddata', finish);
          video.removeEventListener('canplay', finish);
          resolve();
        };
        const timer = setTimeout(finish, timeoutMs);
        video.addEventListener('loadeddata', () => {
          clearTimeout(timer);
          finish();
        }, { once: true });
        video.addEventListener('canplay', () => {
          clearTimeout(timer);
          finish();
        }, { once: true });
      });
    }

    async function startFakeVideoAndPiP() {
      fakeVideo.autoplay = true;
      fakeVideo.loop = true;
      fakeVideo.disablePictureInPicture = false;
      fakeVideo.src = '';
      fakeVideo.srcObject = createTinyFakeStream();

      await Promise.resolve(fakeVideo.play()).catch(() => {});
      await waitForVideoReady(fakeVideo);
      const pipFromStream = await requestPiP().catch(() => false);
      if (pipFromStream) return true;

      const clipUrl = await createRecordedClipUrl();
      if (!clipUrl) return false;

      fakeVideo.srcObject = null;
      fakeVideo.src = clipUrl;
      fakeVideo.currentTime = 0;
      await Promise.resolve(fakeVideo.play()).catch(() => {});
      await waitForVideoReady(fakeVideo);
      return requestPiP();
    }

    async function start() {
      keepAwakeEnabled = true;
      startBtn.disabled = true;
      pipBtn.disabled = false;
      stopBtn.disabled = false;

      const pipPromise = startFakeVideoAndPiP()
        .then(() => true)
        .catch(() => false);
      const wakePromise = requestWakeLock();

      const [pipOk, wakeOk] = await Promise.all([pipPromise, wakePromise]);

      const lines = [];
      lines.push(wakeOk ? 'Wake Lock: active.' : 'Wake Lock: unavailable or blocked.');
      lines.push(pipOk ? 'PiP: active.' : (supportsPiP() ? 'PiP: auto start blocked. Use player PiP button.' : 'PiP: not supported on this browser.'));
      lines.push('Tip: keep this tab open for best reliability.');

      setStatus(lines, wakeOk || pipOk ? 'ok' : 'warn');
    }

    async function stop() {
      keepAwakeEnabled = false;
      startBtn.disabled = false;
      pipBtn.disabled = true;
      stopBtn.disabled = true;

      if (wakeLockSentinel) {
        try { await wakeLockSentinel.release(); } catch {}
        wakeLockSentinel = null;
      }

      if (document.pictureInPictureElement) {
        try { await document.exitPictureInPicture(); } catch {}
      }

      try {
        fakeVideo.pause();
        fakeVideo.srcObject = null;
        fakeVideo.src = '';
      } catch {}

      if (fakeStream) {
        fakeStream.getTracks().forEach((t) => t.stop());
        fakeStream = null;
      }

      setStatus('Stopped.');
    }

    document.addEventListener('visibilitychange', async () => {
      if (!keepAwakeEnabled) return;
      if (document.visibilityState === 'visible' && !wakeLockSentinel) {
        await requestWakeLock();
      }
    });

    startBtn.addEventListener('click', start);
    pipBtn.addEventListener('click', async () => {
      const pipOk = await startFakeVideoAndPiP().catch(() => false);
      setStatus(
        pipOk ? ['PiP: active.', 'Wake Lock state unchanged.'] : ['PiP start failed on this tap.', 'Use the player PiP button in controls.'],
        pipOk ? 'ok' : 'warn'
      );
    });
    stopBtn.addEventListener('click', stop);
  </script>
</body>
</html>
